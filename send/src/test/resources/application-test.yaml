# ============================================================================
# Test Profile Configuration
# ============================================================================
# Imports bearer tokens and test-specific settings for E2E tests
# ============================================================================

# ============================================================================
# External Configuration Import
# Loads bearer tokens for test environment from external properties file
# ============================================================================
spring:
  config:
    activate:
      on-profile: test
    import: optional:classpath:secrets/bearer-token-test.properties

# ============================================================================
# URLs Configuration
# Base URLs and routes for test environment
# ============================================================================
url:
  notifiche:
    cittadino:
      base: https://cittadini.test.notifichedigitali.it
      notifiche: ${url.notifiche.cittadino.base}/notifiche
      recapiti: ${url.notifiche.cittadino.base}/recapiti
      deleghe: ${url.notifiche.cittadino.base}/deleghe
      add-deleghe: ${url.notifiche.cittadino.base}/deleghe/nuova
      app-status: ${url.notifiche.cittadino.base}/app-status
    persona-giuridica:
      base: https://imprese.test.notifichedigitali.it
      notifiche: ${url.notifiche.persona-giuridica.base}/notifiche
      notifiche-delegato: ${url.notifiche.persona-giuridica.base}/notifiche-delegato
      app-status: ${url.notifiche.persona-giuridica.base}/app-status
      integrazione-api: ${url.notifiche.persona-giuridica.base}/integrazione-api
      recapiti: ${url.notifiche.persona-giuridica.base}/recapiti
      deleghe-a-carico: ${url.notifiche.persona-giuridica.base}/deleghe/a-carico
      delegati: ${url.notifiche.persona-giuridica.base}/deleghe/delegati
      add-delegati: ${url.notifiche.persona-giuridica.base}/deleghe/delegati/nuova
    mittente:
      base: https://selfcare.test.notifichedigitali.it
      dashboard: ${url.notifiche.mittente.base}/dashboard
      new-notification: ${url.notifiche.mittente.dashboard}/nuova-notifica
      api-keys: ${url.notifiche.mittente.base}/api-keys
      new-api-key: ${url.notifiche.mittente.api-keys}/nuova-api-key
      app-status: ${url.notifiche.mittente.base}/app-status
      statistics: ${url.notifiche.mittente.base}/statistiche
    supporto:
      base: https://uat.selfcare.pagopa.it

# ============================================================================
# Authentication Tokens
# Bearer token for users
# ============================================================================
token:
  mittente: ${pn.external.bearer-token.tokentestMittente}
  supporto: ${pn.external.bearer-token.tokenSupporto}
