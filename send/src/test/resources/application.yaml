# ============================================================================
# Spring Configuration
# ============================================================================
spring:
  profiles:
    active: test

# ============================================================================
# Channel Configuration
# Defines browser settings for Web and Mobile channels
# ============================================================================
channel:
  web:
    browser: chrome
    headless: false
    arguments:
      - --window-size=1920,1080
      - --incognito

# ============================================================================
# Logging Configuration
# ============================================================================
logging:
  level:
    E2E-Framework: DEBUG
